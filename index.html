<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ticket Classificator CreNope</title>
  <style>
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3e;
      --accent:  #FD6F3B;
      --accent_complementary: #3BC9FD;
      --green:   #3ecf8e;
      --text:    #e2e4f0;
      --muted:   #6b7094;
      --error:   #f87171;
      --mono:    'JetBrains Mono', 'Fira Code', monospace;
      --sans:    'Inter', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }



    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
    }

    body {
    background: linear-gradient(-45deg, var(--accent), var(--bg), var(--bg));
    background-size: 300% 300%;
    animation: gradient 30s ease infinite;
}

@keyframes gradient {
    0% {
        background-position: 40% 50%;
    }
    50% {
        background-position: 50% 80%;
    }
    100% {
        background-position: 40% 50%;
    }
}

    header { text-align: center; margin-bottom: 2.5rem; }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: .4rem; }
    .sub { color: var(--muted); font-size: .85rem; font-family: var(--mono); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
      width: 100%;
      max-width: 640px;
      margin-bottom: 1.25rem;
      box-shadow: rgba(0, 0, 0, 0.3) 0px 0px 100px 1px;
      animation: card_fadein 1s ease forwards;
    }

    @keyframes card_fadein {
    0% {
      box-shadow: 0 0 20px 1px var(--accent) }

    100% {
      box-shadow: 0 0 1px 0.5px var(--border);
        }
    }

    label {
      display: block;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .6rem;
    }
      textarea {
      width: 100%;
      height: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--sans);
      font-size: .92rem;
      line-height: 1.6;
      padding: .85rem;
      resize: vertical;
      min-height: 110px;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 1rem;
    }

      .textAreaBig {
      width: 100%;
      height: 200px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--sans);
      font-size: .92rem;
      line-height: 1.6;
      padding: .85rem;
      resize: vertical;
      min-height: 110px;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 1rem;
    }
    textarea:focus { border-color: var(--accent); }

    /* Operazione chips */
    .ops {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: 1.25rem;
    }

    .op-chip {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-size: .78rem;
      padding: .3rem .85rem;
      cursor: pointer;
      transition: border-color .15s, color .15s, background .15s;
      user-select: none;
    }
    .op-chip.active, .op-chip:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(124,106,247,.12);
    }

    .send-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: .92rem;
      font-weight: 600;
      padding: .75rem;
      cursor: pointer;
      transition: opacity .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }
    .send-btn:hover   { opacity: .85; }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Response */
    .result-card { display: none; }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .75rem;
    }

    .badge {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .06em;
      padding: .25rem .6rem;
      border-radius: 5px;
    }
    .badge.ok  { background: #0d2e21; color: var(--green); }
    .badge.err { background: #2e0d0d; color: var(--error); }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: .72rem;
      padding: .2rem .6rem;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .copy-btn:hover { color: var(--text); border-color: var(--accent); }

    .result-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .85rem;
      font-size: .92rem;
      line-height: 1.7;
      min-height: 60px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .op-label {
      font-size: .72rem;
      color: var(--muted);
      margin-top: .6rem;
      font-family: var(--mono);
    }
  </style>
</head>
<body>

<header>
  <h1>CreNoPe Ticket Classificator </h1>
  <div class="sub">https://github.com/digi98/ticket_classifier_ui/</div>
</header>

<!-- Form -->

<div class="card">

  <label for="inputText">Descrizione ticket (Obbligatorio*)</label>
  <textarea id="inputText" class="textAreaBig" placeholder="Scrivi qui il testo del ticket..."></textarea>

  <label>Operazione</label>
  <div class="ops" id="ops">
    <div class="op-chip active" data-op="classifica">Classificatore testo Ticket</div>
    <div class="op-chip" data-op="base64">Classificatore testo e oggetto ticket</div>
  </div>

  <button class="send-btn" id="sendBtn" onclick="inviaRichiesta()">
    <span class="spinner" id="spinner"></span>
    <span id="btnLabel">Classifica</span>
  </button>
</div>

<!-- Risposta -->
<div class="card result-card" id="resultCard">
  <div class="result-header">
    <span class="badge ok" id="badge">200 OK</span>
    <button class="copy-btn" onclick="copiaTesto()">Copia</button>
  </div>
  <div class="result-box" id="resultBox"></div>
  <div class="op-label" id="opLabel"></div>
</div>


<script>
  // --- Gestione chip selezione operazione ---
  let opSelezionata = "classifica";

  document.getElementById("ops").addEventListener("click", e => {
    const chip = e.target.closest(".op-chip");
    if (!chip) return;
    document.querySelectorAll(".op-chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    opSelezionata = chip.dataset.op;
  });

  // --- Invio richiesta a FastAPI ---
  async function inviaRichiesta() {

    const testo = document.getElementById("inputText").value.trim();
    if (!testo) {
      alert("Inserisci il testo del ticket prima di procedere.");
      return;
    }


    const btn     = document.getElementById("sendBtn");
    const spinner = document.getElementById("spinner");
    const label   = document.getElementById("btnLabel");

    btn.disabled = true;
    spinner.style.display = "block";
    label.textContent = "Invio...";

    try {
      const risposta = await fetch("https://ticketclassificator.onrender.com/trasforma", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ testo: testo, operazione: opSelezionata })
      });

      const dati = await risposta.json();

      const resultCard = document.getElementById("resultCard");
      const resultBox  = document.getElementById("resultBox");
      const badge      = document.getElementById("badge");
      const opLabel    = document.getElementById("opLabel");

      resultCard.style.display = "block";

      if (risposta.ok) {
        badge.className   = "badge ok";
        badge.textContent = risposta.status + " OK";
        resultBox.textContent = dati.risultato ?? JSON.stringify(dati, null, 2);
        opLabel.textContent   = `operazione: ${dati.operazione}`;
      } else {
        badge.className   = "badge err";
        badge.textContent = risposta.status + " Errore";
        resultBox.textContent = dati.detail ?? "Errore sconosciuto";
        opLabel.textContent = "";
      }

    } catch (err) {
      const resultCard = document.getElementById("resultCard");
      resultCard.style.display = "block";
      document.getElementById("badge").className   = "badge err";
      document.getElementById("badge").textContent = "Network Error";
      document.getElementById("resultBox").textContent =
        "Impossibile raggiungere FastAPI.\n\nAssicurati che il server sia avviato:\n  uvicorn main:app --reload";
      document.getElementById("opLabel").textContent = "";
    }

    btn.disabled = false;
    spinner.style.display = "none";
    label.textContent = "Classifica";
  }

  // Invio anche con Ctrl+Enter
  document.getElementById("inputText").addEventListener("keydown", e => {
    if (e.key === "Enter" && e.ctrlKey) inviaRichiesta();
  });

  function copiaTesto() {
    const testo = document.getElementById("resultBox").textContent;
    navigator.clipboard.writeText(testo).then(() => {
      const btn = document.querySelector(".copy-btn");
      btn.textContent = "Copiato ✓";
      setTimeout(() => btn.textContent = "Copia", 1500);
    });
  }
</script>
</body>
</html>
